<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto Bootstrap Puro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

                        </li>
                        <li class="nav-item">

    <main class="position-relative vh-100 overflow-hidden">

        <div class="position-relative h-100 d-flex align-items-center justify-content-center text-center text-white">
            <div class="container">
                <h1 class="display-1 fw-bold">Título Principal</h1>
                <p class="fs-4">Subtítulo o descripción corta aquí.</p>
